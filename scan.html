<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテマップ - カルテ読み取り</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .km-scan-drop {
    border: 2px dashed #cdbfa8;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    background: #fffdf9;
    margin-bottom: 16px;
  }
  .km-scan-drop p {
    color: #7a6a54;
    font-size: 14px;
    margin: 0 0 14px;
  }
  .km-scan-preview {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 14px;
    display: none;
  }
  .km-scan-hidden-input { display: none; }
</style>
</head>
<body>

<div class="km-header">
  <a href="dashboard.html" class="km-back">← 戻る</a>
  <h1>カルテ読み取り</h1>
  <div class="km-header-right"></div>
</div>

<div class="km-container">

  <!-- 撮影・選択 -->
  <div id="captureCard" class="km-card">
    <h2>カルテを撮影 / 選択</h2>
    <div class="km-scan-drop">
      <p>手書きカルテを撮影、または画像を選んでください。<br>AIが氏名・住所・電話番号を読み取ります。</p>
      <img id="previewImg" class="km-scan-preview" alt="プレビュー">
      <button id="cameraBtn" class="km-btn km-btn-primary km-btn-block">カメラで撮影</button>
      <div style="margin-top:10px;">
        <button id="fileBtn" class="km-btn km-btn-secondary km-btn-block">画像を選ぶ</button>
      </div>
      <!-- capture属性つき＝カメラ起動 / なし＝ライブラリ選択 -->
      <input type="file" id="cameraInput" class="km-scan-hidden-input" accept="image/*" capture="environment">
      <input type="file" id="fileInput" class="km-scan-hidden-input" accept="image/*">
    </div>
    <button id="readBtn" class="km-btn km-btn-primary km-btn-block" disabled>この画像を読み取る</button>
    <div id="captureError" class="km-error" style="margin-top:12px;"></div>
  </div>

  <!-- 確認・編集フォーム（OCR後に表示） -->
  <div id="formCard" class="km-card" style="display:none;">
    <h2>読み取り結果を確認</h2>
    <div class="km-hint" style="margin-bottom:12px;">
      AIの読み取りには誤りが含まれることがあります。必ず内容を確認・修正してから保存してください。
    </div>
    <div id="formError" class="km-error"></div>

    <div class="km-field">
      <label for="fName">氏名 <span style="color:#b04a3a;">*</span></label>
      <input type="text" id="fName" placeholder="山田 花子">
    </div>
    <div class="km-field">
      <label for="fNameKana">氏名カナ</label>
      <input type="text" id="fNameKana" placeholder="ヤマダ ハナコ">
    </div>
    <div class="km-field">
      <label for="fPhone">電話番号</label>
      <input type="tel" id="fPhone" placeholder="090-1234-5678">
    </div>
    <div class="km-field">
      <label for="fPostal">郵便番号</label>
      <input type="text" id="fPostal" placeholder="700-0000">
    </div>
    <div class="km-field-row">
      <div class="km-field">
        <label for="fPrefecture">都道府県</label>
        <input type="text" id="fPrefecture" placeholder="岡山県">
      </div>
      <div class="km-field">
        <label for="fCity">市区町村</label>
        <input type="text" id="fCity" placeholder="岡山市北区">
      </div>
    </div>
    <div class="km-field">
      <label for="fAddress">番地以降</label>
      <input type="text" id="fAddress" placeholder="丸の内1-1-1">
    </div>
    <div class="km-field">
      <label for="fMemo">メモ</label>
      <textarea id="fMemo" placeholder="施術内容や来店メモなど"></textarea>
    </div>

    <button id="saveBtn" class="km-btn km-btn-primary km-btn-block">この内容で保存</button>
    <div style="margin-top:12px;">
      <button id="retryBtn" class="km-btn km-btn-secondary km-btn-block">撮影をやり直す</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>

<script src="js/shared_db.js"></script>
<script src="js/shared_auth.js"></script>
<script src="js/shared_ui.js"></script>

<script>
(function () {
  var selectedBase64 = null;   // data URLプレフィックスを除いたbase64
  var selectedMime = 'image/jpeg';

  function showCaptureError(msg) {
    var box = document.getElementById('captureError');
    box.innerHTML = '';
    box.appendChild(document.createTextNode(msg));
    box.className = 'km-error km-show';
  }
  function clearCaptureError() {
    document.getElementById('captureError').className = 'km-error';
  }
  function showFormError(msg) {
    var box = document.getElementById('formError');
    box.innerHTML = '';
    box.appendChild(document.createTextNode(msg));
    box.className = 'km-error km-show';
  }
  function clearFormError() {
    document.getElementById('formError').className = 'km-error';
  }

  // 選択された画像ファイルを読み込んでプレビュー＆base64化
  function handleFile(file) {
    clearCaptureError();
    if (!file) {
      return;
    }
    if (file.type.indexOf('image/') !== 0) {
      showCaptureError('画像ファイルを選んでください。');
      return;
    }
    selectedMime = file.type;
    var reader = new FileReader();
    reader.onload = function (e) {
      var dataUrl = e.target.result;
      // プレビュー表示
      var img = document.getElementById('previewImg');
      img.src = dataUrl;
      img.style.display = 'block';
      // base64部分だけ取り出す
      var commaIdx = dataUrl.indexOf('base64,');
      if (commaIdx !== -1) {
        selectedBase64 = dataUrl.substring(commaIdx + 'base64,'.length);
      } else {
        selectedBase64 = null;
      }
      // 読み取りボタンを有効化
      document.getElementById('readBtn').disabled = false;
    };
    reader.onerror = function () {
      showCaptureError('画像の読み込みに失敗しました。');
    };
    reader.readAsDataURL(file);
  }

  // OCR実行
  function handleRead() {
    clearCaptureError();
    if (!selectedBase64) {
      showCaptureError('先に画像を撮影／選択してください。');
      return;
    }
    uiShowLoading();
    dbExtractKarteData(selectedBase64, selectedMime).then(function (data) {
      uiForceHideLoading();
      fillForm(data);
      showFormMode();
    }).catch(function (error) {
      uiForceHideLoading();
      var msg = 'カルテの読み取りに失敗しました。';
      if (error && error.message) {
        msg = error.message;
      }
      showCaptureError(msg + '（手入力での登録もできます）');
    });
  }

  function fillForm(data) {
    data = data || {};
    document.getElementById('fName').value = data.name || '';
    document.getElementById('fNameKana').value = data.nameKana || '';
    document.getElementById('fPhone').value = data.phone || '';
    document.getElementById('fPostal').value = data.postalCode || '';
    document.getElementById('fPrefecture').value = data.prefecture || '';
    document.getElementById('fCity').value = data.city || '';
    document.getElementById('fAddress').value = data.address || '';
    document.getElementById('fMemo').value = '';
  }

  function showFormMode() {
    document.getElementById('captureCard').style.display = 'none';
    document.getElementById('formCard').style.display = 'block';
    clearFormError();
  }
  function showCaptureMode() {
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('captureCard').style.display = 'block';
  }

  function collectForm() {
    var prefecture = document.getElementById('fPrefecture').value.trim();
    var city = document.getElementById('fCity').value.trim();
    var address = document.getElementById('fAddress').value.trim();
    var fullAddressInput = (prefecture + city + address).trim();
    return {
      name: document.getElementById('fName').value.trim(),
      nameKana: document.getElementById('fNameKana').value.trim(),
      phone: document.getElementById('fPhone').value.trim(),
      postalCode: document.getElementById('fPostal').value.trim(),
      prefecture: prefecture,
      city: city,
      address: address,
      fullAddressInput: fullAddressInput,
      memo: document.getElementById('fMemo').value.trim()
    };
  }

  function handleSave() {
    clearFormError();
    var data = collectForm();
    if (!data.name) {
      showFormError('氏名を入力してください。');
      return;
    }
    uiShowLoading();
    dbAddCustomer(data).then(function () {
      uiForceHideLoading();
      uiToast('保存しました');
      window.location.href = 'customers.html';
    }).catch(function () {
      uiForceHideLoading();
      showFormError('保存に失敗しました。もう一度お試しください。');
    });
  }

  // イベント登録
  document.getElementById('cameraBtn').addEventListener('click', function () {
    document.getElementById('cameraInput').click();
  });
  document.getElementById('fileBtn').addEventListener('click', function () {
    document.getElementById('fileInput').click();
  });
  document.getElementById('cameraInput').addEventListener('change', function (e) {
    if (e.target.files && e.target.files[0]) {
      handleFile(e.target.files[0]);
    }
  });
  document.getElementById('fileInput').addEventListener('change', function (e) {
    if (e.target.files && e.target.files[0]) {
      handleFile(e.target.files[0]);
    }
  });
  document.getElementById('readBtn').addEventListener('click', handleRead);
  document.getElementById('saveBtn').addEventListener('click', handleSave);
  document.getElementById('retryBtn').addEventListener('click', function () {
    selectedBase64 = null;
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('readBtn').disabled = true;
    showCaptureMode();
  });

  authRequireLogin(function () {
    // ログイン済みなら何もしない（撮影待ち）
  });
})();
</script>

</body>
</html>
