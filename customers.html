<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテマップ - 顧客一覧</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="km-header">
  <a href="dashboard.html" class="km-back">← 戻る</a>
  <h1>顧客一覧</h1>
  <div class="km-header-right">
    <a href="customer_detail.html" class="km-logout">＋ 追加</a>
  </div>
</div>

<div class="km-container">

  <div class="km-search">
    <input type="text" id="searchInput" placeholder="氏名・住所で検索">
  </div>

  <div style="margin-bottom:14px;">
    <button id="importCsvBtn" class="km-btn km-btn-secondary" style="width:100%;">📥 CSVから取り込む</button>
    <input type="file" id="importCsvFile" accept=".csv,.xls,.xlsx" style="display:none;">
    <div class="km-hint" style="margin-top:4px;">筆まめ形式（郵便番号・住所1・住所2・氏名）のCSV・XLS・XLSXを取り込めます。</div>
  </div>

  <!-- インポート確認モーダル -->
  <div id="importModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:24px; max-width:340px; width:90%; margin:auto; position:relative; top:50%; transform:translateY(-50%);">
      <h3 style="margin:0 0 12px; font-size:16px;">取り込むシートを選択</h3>
      <p style="margin:0 0 10px; font-size:13px; color:#666;">取り込みたいシートにチェックを入れてください。</p>
      <div id="importSheetList" style="margin-bottom:16px;"></div>
      <p id="importModalMsg" style="margin:0 0 16px; font-size:13px; color:#888; line-height:1.5;"></p>
      <div style="display:flex; gap:10px;">
        <button id="importCancelBtn" class="km-btn km-btn-secondary" style="flex:1;">キャンセル</button>
        <button id="importExecBtn" class="km-btn km-btn-primary" style="flex:1;">取り込む</button>
      </div>
    </div>
  </div>

  <div id="csvArea" style="display:none; margin-bottom:14px;">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button id="csvFudemameBtn" class="km-btn km-btn-secondary" style="flex:1; min-width:200px;">CSV出力（筆まめ用）</button>
      <button id="csvUtf8Btn" class="km-btn km-btn-secondary" style="flex:1; min-width:200px;">CSV出力（iPad確認用）</button>
    </div>
    <div class="km-hint" style="margin-top:6px;">筆まめ用はShift_JIS、iPad確認用はUTF-8で出力します。</div>
  </div>

  <div id="listArea"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Shift_JIS変換用ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
<!-- XLS/XLSX読み込み用ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="js/shared_db.js"></script>
<script src="js/shared_auth.js"></script>
<script src="js/shared_ui.js"></script>
<script src="js/shared_csv.js"></script>

<script>
(function () {
  var allCustomers = [];

  function buildAddressText(c) {
    var parts = [];
    if (c.prefecture) { parts.push(c.prefecture); }
    if (c.city) { parts.push(c.city); }
    if (c.address) { parts.push(c.address); }
    if (parts.length === 0 && c.fullAddressInput) {
      return c.fullAddressInput;
    }
    return parts.join('');
  }

  function renderList(customers) {
    var area = document.getElementById('listArea');
    area.innerHTML = '';

    if (customers.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'km-empty';
      empty.innerHTML =
        '<div class="km-empty-icon">📋</div>' +
        '<p>まだ顧客が登録されていません。</p>' +
        '<a href="customer_detail.html" class="km-btn km-btn-primary">最初の顧客を追加</a>';
      area.appendChild(empty);
      return;
    }

    var i;
    for (i = 0; i < customers.length; i++) {
      var c = customers[i];
      var a = document.createElement('a');
      a.className = 'km-list-item';
      a.href = 'customer_detail.html?id=' + encodeURIComponent(c.id);

      var addr = buildAddressText(c);
      var sub = addr;
      if (c.phone) {
        if (sub) {
          sub = sub + '　/　' + c.phone;
        } else {
          sub = c.phone;
        }
      }

      a.innerHTML =
        '<div class="km-list-name">' + uiEscape(c.name || '(名前未入力)') + '</div>' +
        '<div class="km-list-sub">' + uiEscape(sub || '住所・電話未入力') + '</div>';
      area.appendChild(a);
    }
  }

  function applySearch() {
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) {
      renderList(allCustomers);
      return;
    }
    var filtered = [];
    var i;
    for (i = 0; i < allCustomers.length; i++) {
      var c = allCustomers[i];
      var hay = (
        (c.name || '') + ' ' +
        (c.nameKana || '') + ' ' +
        buildAddressText(c) + ' ' +
        (c.phone || '')
      ).toLowerCase();
      if (hay.indexOf(q) !== -1) {
        filtered.push(c);
      }
    }
    renderList(filtered);
  }

  function loadCustomers() {
    uiShowLoading();
    dbListCustomers().then(function (snapshot) {
      uiForceHideLoading();
      allCustomers = [];
      snapshot.forEach(function (doc) {
        var data = doc.data();
        data.id = doc.id;
        allCustomers.push(data);
      });
      renderList(allCustomers);
      // 顧客が1件以上あればCSV出力エリアを表示
      var csvArea = document.getElementById('csvArea');
      if (allCustomers.length > 0) {
        csvArea.style.display = 'block';
      } else {
        csvArea.style.display = 'none';
      }
    }).catch(function () {
      uiForceHideLoading();
      uiToast('読み込みに失敗しました');
    });
  }

  function handleCsvFudemame() {
    if (allCustomers.length === 0) {
      uiToast('出力する顧客がいません');
      return;
    }
    var ok = window.confirm('筆まめ用CSV（Shift_JIS）をダウンロードします。\nファイル名: kartemap_customers_fudemame.csv');
    if (!ok) {
      return;
    }
    try {
      csvDownloadFudemame(allCustomers);
      uiToast('筆まめ用CSVを出力しました');
    } catch (e) {
      uiToast('CSV出力に失敗しました');
    }
  }

  function handleCsvUtf8() {
    if (allCustomers.length === 0) {
      uiToast('出力する顧客がいません');
      return;
    }
    var ok = window.confirm('iPad確認用CSV（UTF-8）をダウンロードします。\nファイル名: kartemap_customers_utf8.csv');
    if (!ok) {
      return;
    }
    try {
      csvDownloadUtf8(allCustomers);
      uiToast('iPad確認用CSVを出力しました');
    } catch (e) {
      uiToast('CSV出力に失敗しました');
    }
  }

  /* ---- CSVインポート ---- */
  var importRows = [];
  var importWorkbook = null;

  function decodeBytes(uint8arr) {
    var detected = Encoding.detect(uint8arr);
    var unicode = Encoding.convert(uint8arr, { to: 'UNICODE', from: detected });
    return Encoding.codeToString(unicode);
  }

  function parseCsvLine(line) {
    var result = [];
    var cur = '';
    var inQ = false;
    var i;
    for (i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQ) {
        if (ch === '"') {
          if (line[i + 1] === '"') { cur += '"'; i++; }
          else { inQ = false; }
        } else { cur += ch; }
      } else {
        if (ch === '"') { inQ = true; }
        else if (ch === ',') { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
    }
    result.push(cur.trim());
    return result;
  }

  function parseCsvText(text) {
    var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    var rows = [];
    var i;
    for (i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) { continue; }
      var cols = parseCsvLine(line);
      if (i === 0 && (cols[0] === '郵便番号' || cols[0] === 'postcode' || cols[0] === 'zip')) { continue; }
      var name = cols.length >= 4 ? cols[3] : (cols[0] || '');
      if (!name) { continue; }
      rows.push({
        postalCode: (cols[0] || '').replace(/[－−]/g, '-'),
        fullAddressInput: cols[1] || '',
        address2: cols[2] || '',
        name: name, phone: '', memo: ''
      });
    }
    return rows;
  }

  function parseSheetRows(data) {
    var rows = [];
    var i;
    for (i = 0; i < data.length; i++) {
      var cols = data[i];
      if (i === 0 && (String(cols[0]).indexOf('郵便') !== -1 || String(cols[0]).toLowerCase() === 'zip')) { continue; }
      var name = String(cols[3] || '').trim();
      if (!name) { continue; }
      rows.push({
        postalCode: String(cols[0] || '').trim().replace(/[－−]/g, '-'),
        fullAddressInput: String(cols[1] || '').trim(),
        address2: String(cols[2] || '').trim(),
        name: name, phone: '', memo: ''
      });
    }
    return rows;
  }

  /* チェック中シートの合計件数を更新 */
  function updateImportMsg() {
    if (!importWorkbook) { return; }
    var checks = document.querySelectorAll('.importSheetChk');
    var total = 0;
    var k;
    for (k = 0; k < checks.length; k++) {
      if (checks[k].checked) {
        var ws = importWorkbook.Sheets[checks[k].value];
        if (ws) {
          var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          total += parseSheetRows(data).length;
        }
      }
    }
    var msg = document.getElementById('importModalMsg');
    msg.textContent = '合計 ' + total + ' 件を取り込みます。\n（地図ピンはマップ表示時に自動変換します）';
    msg.style.whiteSpace = 'pre-line';
  }

  function handleImportCsvClick() {
    document.getElementById('importCsvFile').click();
  }

  function handleImportFileChange(e) {
    var file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) { return; }
    var fname = file.name.toLowerCase();
    var isExcel = (fname.slice(-4) === '.xls' || fname.slice(-5) === '.xlsx');
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        if (isExcel) {
          var wb = XLSX.read(ev.target.result, { type: 'array' });
          importWorkbook = wb;
          /* シート選択UIを構築 */
          var listEl = document.getElementById('importSheetList');
          listEl.innerHTML = '';
          var s;
          for (s = 0; s < wb.SheetNames.length; s++) {
            var sName = wb.SheetNames[s];
            var label = document.createElement('label');
            label.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 0;font-size:15px;border-bottom:1px solid #eee;cursor:pointer;';
            var chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'importSheetChk';
            chk.value = sName;
            chk.style.cssText = 'width:20px;height:20px;flex-shrink:0;';
            /* 「不可」はデフォルトOFF、それ以外はON */
            chk.checked = (sName.indexOf('不可') === -1);
            chk.addEventListener('change', updateImportMsg);
            label.appendChild(chk);
            label.appendChild(document.createTextNode(sName));
            listEl.appendChild(label);
          }
          updateImportMsg();
          document.getElementById('importModal').style.display = 'flex';
        } else {
          importWorkbook = null;
          var uint8arr = new Uint8Array(ev.target.result);
          var text = decodeBytes(uint8arr);
          var rows = parseCsvText(text);
          if (rows.length === 0) { uiToast('取り込めるデータがありませんでした'); return; }
          importRows = rows;
          document.getElementById('importSheetList').innerHTML = '';
          var msg = document.getElementById('importModalMsg');
          msg.textContent = rows.length + ' 件を取り込みます。\n（地図ピンはマップ表示時に自動変換します）';
          msg.style.whiteSpace = 'pre-line';
          document.getElementById('importModal').style.display = 'flex';
        }
      } catch (err) {
        uiToast('ファイルの読み込みに失敗しました');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function handleImportCancel() {
    importRows = [];
    importWorkbook = null;
    document.getElementById('importModal').style.display = 'none';
  }

  function handleImportExec() {
    var rows = [];
    if (importWorkbook) {
      var checks = document.querySelectorAll('.importSheetChk');
      var k;
      for (k = 0; k < checks.length; k++) {
        if (checks[k].checked) {
          var ws = importWorkbook.Sheets[checks[k].value];
          if (ws) {
            var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            rows = rows.concat(parseSheetRows(data));
          }
        }
      }
    } else {
      rows = importRows;
    }
    if (rows.length === 0) { uiToast('取り込むデータがありません'); return; }
    document.getElementById('importModal').style.display = 'none';
    uiShowLoading();
    dbImportCustomers(rows).then(function (count) {
      uiForceHideLoading();
      importRows = [];
      importWorkbook = null;
      uiToast(count + '件を取り込みました');
      loadCustomers();
    }).catch(function (err) {
      uiForceHideLoading();
      importRows = [];
      importWorkbook = null;
      uiToast('取り込みに失敗しました');
    });
  }

  document.getElementById('importCsvBtn').addEventListener('click', handleImportCsvClick);
  document.getElementById('importCsvFile').addEventListener('change', handleImportFileChange);
  document.getElementById('importCancelBtn').addEventListener('click', handleImportCancel);
  document.getElementById('importExecBtn').addEventListener('click', handleImportExec);
  /* ---- CSVインポートここまで ---- */

  document.getElementById('searchInput').addEventListener('input', applySearch);
  document.getElementById('csvFudemameBtn').addEventListener('click', handleCsvFudemame);
  document.getElementById('csvUtf8Btn').addEventListener('click', handleCsvUtf8);

  authRequireLogin(function () {
    loadCustomers();
  });
})();
</script>

</body>
</html>
